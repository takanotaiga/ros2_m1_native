name: Isolated Build

on:
  push:
    branches: ["master", "chore/arm64-macos-fresh-start"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  validate-locks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Sync Python env
        run: ./scripts/bootstrap_python.sh

      - name: Verify pinned manifests
        run: uv run python scripts/check_repos_pinned.py ros2.lock.repos third_party.repos

  build-macos-isolated:
    runs-on: macos-14
    timeout-minutes: 360
    needs: validate-locks
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Run isolated build
        run: ./scripts/run_isolated_build.sh

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: isolated-build-log
          path: .build/isolated_build.log
