name: Isolated Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-locks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Sync Python env
        run: ./scripts/bootstrap_python.sh

      - name: Verify pinned manifests
        run: uv run python scripts/check_repos_pinned.py ros2.lock.repos third_party.repos

  build-macos-isolated:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-14
          - macos-15
          - macos-26
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    needs: validate-locks
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Run isolated build
        run: ./scripts/run_isolated_build.sh

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: isolated-build-log-${{ matrix.runner }}
          path: .build/isolated_build.log
